<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Bot Pro | Campaign Scheduler</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: #f4f7fc;
        }

        .sidebar {
            background: #075e54;
            min-height: 100vh;
            color: white;
        }

        .sidebar .status-card {
            background: #128c7e;
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
        }

        .qr-img {
            max-width: 180px;
            border-radius: 12px;
            background: white;
            padding: 8px;
        }

        .campaign-table th {
            background: #075e54;
            color: white;
        }

        .groups-checkbox-container {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #ced4da;
            border-radius: 8px;
            padding: 10px;
            background: #f8f9fa;
        }
    </style>
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-3 col-lg-2 sidebar p-3">
                <h3 class="text-center"><i class="fab fa-whatsapp"></i> BotPro</h3>
                <div class="status-card text-center" id="statusCard">
                    <i class="fas fa-circle" style="color: #ffc107;"></i> <span
                        id="connectionStatus">Connecting...</span>
                </div>
                <div id="qrCodeContainer" class="text-center mt-3"></div>
                <hr class="bg-light">
                <button id="refreshGroupsBtn" class="btn btn-light w-100 mt-2"><i class="fas fa-sync-alt"></i> Refresh
                    Groups</button>
            </div>

            <!-- Main Content -->
            <div class="col-md-9 col-lg-10 p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2><i class="fas fa-calendar-alt"></i> Campaign Manager</h2>
                    <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#campaignModal"
                        onclick="openAddCampaign()">
                        <i class="fas fa-plus"></i> New Campaign
                    </button>
                </div>
                <div class="table-responsive">
                    <table class="table table-bordered table-hover campaign-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Message</th>
                                <th>Schedule</th>
                                <th>Groups</th>
                                <th>Image</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="campaignsList"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for Campaign -->
    <div class="modal fade" id="campaignModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title" id="modalTitle">Create Campaign</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="campaignForm">
                        <input type="hidden" id="campaignId">
                        <div class="mb-3">
                            <label class="form-label">Campaign Name</label>
                            <input type="text" class="form-control" id="campaignName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Message (Text & links)</label>
                            <textarea class="form-control" id="campaignMessage" rows="3" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Image (optional)</label>
                            <input class="form-control" type="file" id="campaignImage" accept="image/*">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Schedule Date & Time</label>
                            <input type="datetime-local" class="form-control" id="campaignSchedule" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Random Delay Between Groups (seconds)</label>
                            <div class="row">
                                <div class="col">
                                    <input type="number" class="form-control" id="minDelay" placeholder="Min" value="5"
                                        step="1" min="2">
                                    <small class="text-muted">Minimum</small>
                                </div>
                                <div class="col">
                                    <input type="number" class="form-control" id="maxDelay" placeholder="Max" value="15"
                                        step="1" min="3">
                                    <small class="text-muted">Maximum</small>
                                </div>
                            </div>
                            <small class="text-muted">Random delay between min and max seconds helps avoid ban.</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Select Target Groups</label>
                            <div id="groupsCheckboxes" class="groups-checkbox-container mb-2"></div>
                            <small class="text-muted" id="groupsCountInfo"></small>
                        </div>
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" id="campaignEnabled" checked>
                            <label class="form-check-label">Active</label>
                        </div>
                        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Campaign</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="script.js"></script>
</body>

</html>
